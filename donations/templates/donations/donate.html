{% extends "base.html" %}

{% block content %}
<div class="container py-4" style="max-width: 720px;">
  <h1 class="mb-3">Support the Therapy Centre</h1>

  <div class="card p-3 mb-3">
    <p>Choose a fixed amount to donate:</p>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" data-amount="500" type="button">Donate £5</button>
      <button class="btn btn-outline-primary" data-amount="1000" type="button">Donate £10</button>
      <button class="btn btn-outline-primary" data-amount="2000" type="button">Donate £20</button>
    </div>

    <div id="msg" class="text-danger mt-3"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ block.super }}

<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe("{{ stripe_publishable_key }}");
  const msg = document.getElementById("msg");

  async function startCheckout(amount) {
    msg.textContent = "";

    const res = await fetch("{% url 'donations:create_checkout_session' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}",
      },
      body: JSON.stringify({ amount })
    });

    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || "Something went wrong.";
      return;
    }

    await stripe.redirectToCheckout({ sessionId: data.id });
  }

  document.querySelectorAll("button[data-amount]").forEach(btn => {
    btn.addEventListener("click", () => startCheckout(parseInt(btn.dataset.amount)));
  });
</script>
{% endblock %}
